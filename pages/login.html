<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizardly — Iniciar Sesión</title>

    <link rel="icon" href="../images/logo/favicon/favicon.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <!-- CSS general -->
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        body{
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
            url('../images/banner/banner-principal.jpg')
            center/cover no-repeat;
        }

        .login-card{

            width:100%;
            max-width:550px;

            background:rgba(20,10,35,.85);

            backdrop-filter: blur(12px);

            border:1px solid rgba(246,213,122,.2);

            border-radius:25px;

            padding:50px;

            box-shadow:
            0 0 40px rgba(192,132,252,.15),
            0 0 80px rgba(246,213,122,.08);

            animation: aparecer 1s ease;
        }

        @keyframes aparecer{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .login-card h2{
            text-align:center;
            color:var(--gold);
            font-family:'Cinzel Decorative', serif;
            font-size:2.2rem;
            margin-bottom:10px;
        }

        .subtitulo{
            text-align:center;
            color:var(--lilac);
            font-family:'Cinzel', serif;
            letter-spacing:3px;
            margin-bottom:40px;
        }

        .input-group{
            position:relative;
            margin-bottom:25px;
        }

        .input-group i{
            position:absolute;
            left:18px;
            top:50%;
            transform:translateY(-50%);
            color:var(--gold);
        }

        .input-group input{

            width:100%;
            padding:16px 16px 16px 50px;

            border:none;
            border-radius:15px;

            background:rgba(255,255,255,.06);

            color:white;

            border:1px solid transparent;

            transition:.3s;
        }

        .input-group input:focus{

            outline:none;

            border:1px solid var(--gold);

            box-shadow:0 0 20px rgba(246,213,122,.25);
        }

        .btn-login-magico{
            width:100%;
            border:none;
            cursor:pointer;
            margin-top:10px;
        }

        .texto-extra{
            text-align:center;
            margin-top:30px;
            color:var(--text-muted);
        }

        .texto-extra a{
            color:var(--gold);
            text-decoration:none;
        }

        .texto-extra a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="subtitulo">
            ✦ Accede al Mercado Arcano ✦
        </div>

        <h2>Iniciar Sesión</h2>

        <form id="loginForm">

            <div class="input-group">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="correo"
                    placeholder="Correo Electrónico"
                    required>

            </div>

            <div class="input-group">

                <i class="fa-solid fa-key"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña Secreta"
                    required>

            </div>

            <div class="recordar-grupo">
    <label class="recordar-label">
        <input type="checkbox" id="recordar">
        <span class="checkmark"></span>
        Recordar contraseña
    </label>
</div>

            <button type="submit" class="btn btn-login-magico">
                Entrar al Mercado
            </button>

        </form>

        <div class="texto-extra">

            ¿Aún no eres miembro del gremio?

            <br><br>

            <a href="registro.html">
                Crear una cuenta
            </a>

        </div>

    </div>

    <script>

        const formulario = document.getElementById('loginForm');

        formulario.addEventListener('submit', function(e){

            e.preventDefault();

            alert("✨ Bienvenido al Mercado Arcano ✨");

            window.location.href = "perfil.html";

        });
src="../js/script.js"
    </script>
</script>

<script src="../js/script.js"></script>

</body>
</body>

</html>
