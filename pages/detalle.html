<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizardly — Detalle del Producto</title>

    <link rel="icon" href="../images/favicon/favicon.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Lato:wght@300;400;700&family=Jim+Nightshade&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/catalogo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- REDES FLOTANTES -->
    <div class="social-float">
        <a href="https://facebook.com" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="https://instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://tiktok.com" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        <a href="https://twitter.com" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="https://youtube.com" target="_blank"><i class="fa-brands fa-youtube"></i></a>
    </div>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <a href="../index.html" class="logo">
                <img src="../images/logo/Logo.png" alt="Logo Wizardly">
                <div class="logo-text">
                    <span class="brand">Wizardly</span>
                    <span class="tagline">Mercado Arcano</span>
                </div>
            </a>
            <ul class="menu">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="../index.html#nosotros">Nosotros</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li>
                    <a href="carrito.html" class="carrito-link">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span id="contador-carrito">0</span>
                    </a>
                </li>
                <li><a href="login.html" class="btn-login">Acceder</a></li>
            </ul>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero-detalle">
        <div class="hero-content">
            <span class="hero-eyebrow">✦ Artefacto ✦</span>
            <h2>Detalle del Producto</h2>
        </div>
    </section>

    <!-- DETALLE -->
    <section class="detalle-section">
        <div class="detalle-container" id="detalle-container"></div>
    </section>

    <!-- PRODUCTOS RELACIONADOS -->
    <section class="relacionados-section">
        <div class="section-header">
            <span class="section-eyebrow">✦ También te puede interesar ✦</span>
            <h3>Productos Relacionados</h3>
        </div>
        <div class="catalogo-grid" id="relacionados-container"></div>
    </section>

    <!-- FOOTER -->
    <footer class="footer-mini">
        <p>© 2026 <span>Wizardly</span> — Mercado Arcano &nbsp;✦&nbsp; Todos los derechos mágicos reservados</p>
    </footer>

    <!-- Scripts: carrito primero, luego el general -->
    <script src="../js/carrito.js"></script>
    <script src="../js/script.js"></script>
    <script>
        // ── Base de productos (única fuente de verdad) ──
        const productos = [
            { id: 1, nombre: "Varita de Saúco",              precio: 350.00, categoria: "Varitas",     etiqueta: "Nuevo",  imagen: "../images/varita sauco.webp",              descripcion: "Tallada en madera de saúco con núcleo de pluma de fénix. Ideal para hechizos de protección y combate arcano de alto nivel." },
            { id: 2, nombre: "Poción de Invisibilidad",      precio: 85.50,  categoria: "Pociones",    etiqueta: "Oferta", imagen: "../images/pocion invisiobilidad.jpg",       descripcion: "Elaborada con extracto de cola de tritón y polvo de luna nueva. Oculta al portador durante exactamente una hora." },
            { id: 3, nombre: "Grimorio de Hechizos Antiguos",precio: 420.00, categoria: "Libros",      etiqueta: "Nuevo",  imagen: "../images/grimorio.jpg",                    descripcion: "Recopilación de conjuros olvidados, escrito en pergamino de dragón. Incluye sellos de protección y notas del autor original." },
            { id: 4, nombre: "Cristal de Adivinación",       precio: 199.99, categoria: "Cristales",   etiqueta: "",       imagen: "../images/cristal de adivinacion.webp",     descripcion: "Cuarzo transparente de las montañas de Zafiro. Permite vislumbrar futuros posibles con práctica adecuada." },
            { id: 5, nombre: "Amuleto de Protección",        precio: 65.00,  categoria: "Amuletos",    etiqueta: "Oferta", imagen: "../images/Amuleto de proteccion.jpeg",      descripcion: "Colgante de plata con runas élficas grabadas a mano. Repelente de energías negativas y mal de ojo garantizado." },
            { id: 6, nombre: "Caldero de Cobre",             precio: 275.00, categoria: "Calderos",    etiqueta: "",       imagen: "../images/Caldero.jpg",                     descripcion: "Caldero reforzado con anillos de bronce encantado, apto para pociones de alto nivel y conjuros de área." },
            { id: 7, nombre: "Mapa del Tesoro Escondido",    precio: 120.00, categoria: "Pergaminos",  etiqueta: "Nuevo",  imagen: "../images/mapa del tesoro.jpg",             descripcion: "Pergamino encantado que revela la ubicación de objetos perdidos. Se actualiza automáticamente con cada luna llena." },
            { id: 8, nombre: "Pluma de Fénix",               precio: 450.00, categoria: "Reliquias",   etiqueta: "Nuevo",  imagen: "../images/pluma de fenix.jpg",              descripcion: "Pluma auténtica de un fénix milenario. Utilizada en varitas y grimorios de alto rango. Certificado de autenticidad incluido." }
        ];

        // ── Mostrar producto principal ──
        function mostrarDetalle() {
            const id = parseInt(new URLSearchParams(window.location.search).get('id'), 10);
            const container = document.getElementById('detalle-container');
            const producto = productos.find(p => p.id === id);

            if (!producto) {
                container.innerHTML = `<p class="detalle-error">⚠️ Producto no encontrado.</p>`;
                return;
            }

            container.innerHTML = `
                <div class="detalle-card">
                    <div class="detalle-imagen">
                        ${producto.etiqueta ? `<span class="detalle-etiqueta ${producto.etiqueta.toLowerCase()}">${producto.etiqueta}</span>` : ''}
                        <img src="${producto.imagen}" alt="${producto.nombre}">
                    </div>
                    <div class="detalle-info">
                        <p class="detalle-categoria">${producto.categoria}</p>
                        <h3>${producto.nombre}</h3>
                        <p class="detalle-precio">$${producto.precio.toFixed(2)} <span>MXN</span></p>
                        <p class="detalle-descripcion">${producto.descripcion}</p>

                        <!-- Selector de cantidad -->
                        <div class="cantidad-wrap">
                            <span class="cantidad-label">Cantidad</span>
                            <div class="cantidad-control">
                                <button class="cantidad-btn" id="btn-menos" onclick="cambiarCantidadLocal(-1)">−</button>
                                <span class="cantidad-valor" id="cantidad-valor">1</span>
                                <button class="cantidad-btn" id="btn-mas"  onclick="cambiarCantidadLocal(1)">+</button>
                            </div>
                        </div>

                        <!-- Botones -->
                        <div class="detalle-btns">
                            <button class="btn" id="btn-agregar" onclick="agregarEsteProducto()">
                                <i class="fa-solid fa-cart-plus"></i> Agregar al carrito
                            </button>
                            <a href="catalogo.html" class="btn-regresar">
                                <i class="fa-solid fa-arrow-left"></i> Regresar
                            </a>
                        </div>
                    </div>
                </div>
            `;

            // Lógica de cantidad local
            let cantidadLocal = 1;

            window.cambiarCantidadLocal = (delta) => {
                cantidadLocal = Math.max(1, cantidadLocal + delta);
                document.getElementById('cantidad-valor').textContent = cantidadLocal;
            };

            window.agregarEsteProducto = () => {
                agregarAlCarrito(producto, cantidadLocal);
            };

            // Relacionados
            mostrarRelacionados(producto);
        }

        // ── Productos relacionados ──
        function mostrarRelacionados(productoActual) {
            const relacionados = productos
                .filter(p => p.id !== productoActual.id && p.categoria === productoActual.categoria)
                .slice(0, 4);

            // Si no hay de la misma categoría, tomar cualquiera
            const lista = relacionados.length >= 2
                ? relacionados
                : productos.filter(p => p.id !== productoActual.id).slice(0, 4);

            const container = document.getElementById('relacionados-container');
            container.innerHTML = '';

            lista.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'producto-card';
                card.innerHTML = `
                    ${prod.etiqueta ? `<span class="etiqueta ${prod.etiqueta.toLowerCase()}">${prod.etiqueta}</span>` : ''}
                    <img src="${prod.imagen}" alt="${prod.nombre}" loading="lazy">
                    <h3>${prod.nombre}</h3>
                    <p class="producto-precio">$${prod.precio.toFixed(2)} MXN</p>
                    <a href="detalle.html?id=${prod.id}" class="btn-detalle">Ver detalle</a>
                `;
                container.appendChild(card);
            });
        }

        mostrarDetalle();
    </script>
</body>
</html>
