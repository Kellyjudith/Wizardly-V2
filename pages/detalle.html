<script src="../js/script.js"></script>
    <script>
        // ============================================================
        //  MISMA LISTA DE PRODUCTOS (debe coincidir con catalogo.html)
        // ============================================================
        const productos = [
            { id: 1, nombre: "Varita de Saúco", precio: 350.00, descripcion: "Tallada en madera de saúco con núcleo de pluma de fénix. Ideal para hechizos de protección.", imagen: "../images/varita sauco.webp"},
            { id: 2, nombre: "Poción de Invisibilidad", precio: 85.50, descripcion: "Brewed con extracto de cola de tritón y polvo de luna. Oculta al bebedor durante 1 hora.", imagen: "../images/pocion invisiobilidad.jpg" },
            { id: 3, nombre: "Grimorio de Hechizos Antiguos", precio: 420.00, descripcion: "Recopilación de conjuros olvidados, escrito en pergamino de dragón. Incluye sellos de protección.", imagen: "../images/grimorio.jpg" },
            { id: 4, nombre: "Cristal de Adivinación", precio: 199.99, descripcion: "Cuarzo transparente de las montañas de Zafiro. Permite vislumbrar futuros posibles.", imagen: "../images/cristal de adivinacion.webp" },
            { id: 5, nombre: "Amuleto de Protección", precio: 65.00, descripcion: "Colgante de plata con runas élficas. Repelente de energías negativas y mal de ojo.", imagen: "../images/amuleto de proteccion.jpeg" },
            { id: 6, nombre: "Caldero de Cobre", precio: 275.00, descripcion: "Caldero reforzado con anillos de bronce, apto para pociones de alto nivel.", imagen: "../images/Caldero.jpg" },
            { id: 7, nombre: "Mapa del Tesoro Escondido", precio: 120.00, descripcion: "Pergamino encantado que revela la ubicación de objetos perdidos. Se actualiza con cada luna llena.", imagen: "../images/mapa del tesoro.jpg" },
            { id: 8, nombre: "Pluma de Fénix", precio: 450.00, descripcion: "Pluma auténtica de un fénix milenario. Utilizada en varitas y grimorios de alto rango.", imagen: "../images/pluma de fenix.jpg"}
        ];

        // ============================================================
        //  OBTENER ID DE LA URL Y MOSTRAR PRODUCTO
        // ============================================================
        function getProductoById(id) {
            return productos.find(p => p.id === id);
        }

        function mostrarDetalle() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'), 10);

            const container = document.getElementById('detalle-container');
            if (!container) return;

            if (isNaN(id)) {
                container.innerHTML = `<p class="detalle-error">⚠️ Producto no especificado.</p>`;
                return;
            }

            const producto = getProductoById(id);
            if (!producto) {
                container.innerHTML = `<p class="detalle-error">⚠️ Producto no encontrado.</p>`;
                return;
            }

            // Construir la vista
            container.innerHTML = `
                <div class="detalle-card">
                    <div class="detalle-imagen">
                        <img src="${producto.imagen}" alt="${producto.nombre}">
                    </div>
                    <div class="detalle-info">
                        <h3>${producto.nombre}</h3>
                        <p class="detalle-precio">$${producto.precio.toFixed(2)} MXN</p>
                        <p class="detalle-descripcion">${producto.descripcion}</p>
                       

    <a href="catalogo.html" class="btn">
        Regresar
    </a>

    <button class="btn" id="btn-carrito">
        Agregar al carrito
    </button>


                </div>
            `;
        }

        // Ejecutar al cargar
        mostrarDetalle();
    
    const btnCarrito = document.getElementById('btn-carrito');

    btnCarrito.addEventListener('click', () => {

        // Crear mensaje
        const mensaje = document.createElement('div');

        mensaje.textContent = "✨ ¡El artefacto ha sido agregado al carruaje!";

        mensaje.classList.add('mensaje-carrito');

        document.body.appendChild(mensaje);

        // Mostrar animación
        setTimeout(() => {
            mensaje.classList.add('mostrar');
        }, 100);

        // Ocultarlo después de 3 segundos
        setTimeout(() => {
            mensaje.classList.remove('mostrar');

            setTimeout(() => {
                mensaje.remove();
            }, 500);

        }, 3000);

    });
</script>
<script>
    // ============================================================
    //  LISTA DE PRODUCTOS
    // ============================================================
    const productos = [
        {
            id: 1,
            nombre: "Varita de Saúco",
            precio: 350.00,
            descripcion: "Tallada en madera de saúco con núcleo de pluma de fénix.",
            imagen: "../images/varita sauco.webp"
        },
        {
            id: 2,
            nombre: "Poción de Invisibilidad",
            precio: 85.50,
            descripcion: "Brewed con extracto de cola de tritón y polvo de luna.",
            imagen: "../images/pocion invisiobilidad.jpg"
        },
        {
            id: 3,
            nombre: "Grimorio de Hechizos Antiguos",
            precio: 420.00,
            descripcion: "Recopilación de conjuros olvidados.",
            imagen: "../images/grimorio.jpg"
        },
        {
            id: 4,
            nombre: "Cristal de Adivinación",
            precio: 199.99,
            descripcion: "Cuarzo transparente de las montañas de Zafiro.",
            imagen: "../images/cristal de adivinacion.webp"
        },
        {
            id: 5,
            nombre: "Amuleto de Protección",
            precio: 65.00,
            descripcion: "Colgante de plata con runas élficas.",
            imagen: "../images/Amuleto de proteccion.jpeg"
        },
        {
            id: 6,
            nombre: "Caldero de Cobre",
            precio: 275.00,
            descripcion: "Caldero reforzado con anillos de bronce.",
            imagen: "../images/Caldero.jpg"
        },
        {
            id: 7,
            nombre: "Mapa del Tesoro Escondido",
            precio: 120.00,
            descripcion: "Pergamino encantado que revela la ubicación de objetos perdidos.",
            imagen: "../images/mapa del tesoro.jpg"
        },
        {
            id: 8,
            nombre: "Pluma de Fénix",
            precio: 450.00,
            descripcion: "Pluma auténtica de un fénix milenario.",
            imagen: "../images/pluma de fenix.jpg"
            
        }
    ];

    // ============================================================
    //  GENERAR TARJETAS
    // ============================================================
    const container = document.getElementById('productos-container');

    if (container) {
        productos.forEach(prod => {

            const card = document.createElement('div');
            card.className = 'producto-card';

            const img = document.createElement('img');
            img.src = prod.imagen;
            img.alt = prod.nombre;
            img.loading = 'lazy';
            card.appendChild(img);

            const nombre = document.createElement('h3');
            nombre.textContent = prod.nombre;
            card.appendChild(nombre);

            const precio = document.createElement('p');
            precio.className = 'producto-precio';
            precio.textContent = `$${prod.precio.toFixed(2)} MXN`;
            card.appendChild(precio);

            const btn = document.createElement('a');
            btn.className = 'btn-detalle';
            btn.href = `detalle.html?id=${prod.id}`;
            btn.textContent = 'Ver detalle';
            card.appendChild(btn);

            container.appendChild(card);
        });
    }
</script>
<script src="../js/script.js"></script>
